<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geometry Dash Menu</title>
  <style>
    /* Loading Pusab Font */
    @font-face {
      font-family: 'Pusab';
      src: url('https://lwepgqwnwivcwefwlxhw.supabase.co/storage/v1/object/public/Music2/Pusab%20full.woff2') format('woff2');
    }

    :root {
      --bg-blue: #2854cf;
      --panel-brown: #bc6d3d;
      --panel-brown-dark: #a1582c;
      /* GD Text Style: Black stroke + Black offset shadow */
      --gd-text-stroke: 1.5px black;
      --gd-text-shadow: 3px 3px 0px rgba(0,0,0,1);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle, #2854cf 0%, #112661 100%);
      color: white;
      font-family: 'Pusab', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* Navigation */
    nav {
      position: absolute;
      top: 20px;
      display: flex;
      gap: 15px;
      z-index: 100;
    }

    .tab-btn {
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid white;
      color: white;
      font-family: 'Pusab', sans-serif;
      font-size: 14px;
      padding: 8px 25px;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.1s;
      -webkit-text-stroke: 1px black;
      text-shadow: 2px 2px 0px black;
    }

    .tab-btn.active {
      background: #ffaa00;
    }

    /* Game Window Wrapper */
    .game-window {
      position: relative;
      width: 90vw;
      max-width: 950px;
      aspect-ratio: 16 / 9;
    }

    /* The Content Area (Behind the Frame) */
    .content-viewport {
      position: absolute;
      top: 6.5%; 
      left: 5%;
      right: 5%;
      bottom: 8.5%;
      z-index: 1; 
      background: #8e4f2b; 
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-width: none;
      display: none; /* Controlled by JS */
    }

    .content-viewport.active {
      display: flex;
      flex-direction: column;
    }

    .content-viewport::-webkit-scrollbar {
      display: none;
    }

    /* The Hub Frame (ON TOP) */
    .hub-frame-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://lwepgqwnwivcwefwlxhw.supabase.co/storage/v1/object/public/Music2/Hubv2.png');
      background-size: 100% 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* Level Rows (3 visible at a time) */
    .level-item {
      height: 33.33%; 
      flex-shrink: 0;
      background: var(--panel-brown);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-bottom: 2px solid rgba(0,0,0,0.3);
      box-sizing: border-box;
    }

    .level-item:nth-child(even) {
      background: var(--panel-brown-dark);
    }

    /* Text Styling */
    .level-name, .demon-title {
      font-size: 32px;
      margin: 0;
      text-transform: uppercase;
      -webkit-text-stroke: var(--gd-text-stroke);
      text-shadow: var(--gd-text-shadow);
    }

    .level-creator, .demon-desc {
      font-size: 18px;
      color: #fdc416;
      -webkit-text-stroke: var(--gd-text-stroke);
      text-shadow: var(--gd-text-shadow);
      margin-top: 5px;
    }

    .demon-link {
      color: #00ffff !important;
      text-decoration: underline;
    }

    /* Play Button */
    .play-btn {
      width: 110px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.1s;
    }
    .play-btn:hover { transform: scale(1.05); }

    /* WBDL Layout */
    .demon-container {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    /* Pagination Arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 75px;
      cursor: pointer;
      z-index: 20;
    }

    #prev-btn { left: -90px; transform: translateY(-50%) scaleX(-1); }
    #next-btn { right: -90px; }

    .page-indicator {
      position: absolute;
      top: -35px;
      right: 10px;
      font-size: 20px;
      -webkit-text-stroke: 1px black;
      text-shadow: 2px 2px 0px black;
    }

    .import-style { background: #468d49 !important; }

  </style>
</head>

<body>

  <nav>
    <button id="tab-levels" class="tab-btn active" onclick="openTab('levels')">LEVELS</button>
    <button id="tab-demonlist" class="tab-btn" onclick="openTab('demonlist')">WBDL</button>
  </nav>

  <div class="game-window">
    <div class="page-indicator" id="page-text">PAGE 1</div>
    
    <div class="hub-frame-overlay"></div>

    <!-- Navigation Arrows -->
    <img src="https://lwepgqwnwivcwefwlxhw.supabase.co/storage/v1/object/public/Music2/Next.png" 
         id="prev-btn" class="nav-arrow" onclick="changePage(-1)" alt="Back">
    
    <img src="https://lwepgqwnwivcwefwlxhw.supabase.co/storage/v1/object/public/Music2/Next.png" 
         id="next-btn" class="nav-arrow" onclick="changePage(1)" alt="Next">

    <!-- LEVELS TAB CONTENT -->
    <div id="level-list" class="content-viewport active"></div>

    <!-- WBDL TAB CONTENT -->
    <div id="demonlist-content" class="content-viewport">
      <div class="demon-container">
        <h2 class="demon-title">Web Browser Demonlist</h2>
        <p class="demon-desc">Visit the <a href="https://webdemonlist.org/" target="_blank" class="demon-link">WBDL website</a><br>to see the rankings :O</p>
      </div>
    </div>
  </div>

  <script>
    const levels = [
      { name: "Import Level", creator: "Custom ID", id: "custom", special: true },
      { name: "Stereo Madness", creator: "RobTop", id: "-1" },
      { name: "Back on Track", creator: "RobTop", id: "-2" },
      { name: "Polargeist", creator: "RobTop", id: "-3" },
      { name: "Dry Out", creator: "RobTop", id: "-4" },
      { name: "Base after Base", creator: "RobTop", id: "-5" },
      { name: "Cant Let Go", creator: "RobTop", id: "-6" },
      { name: "Jumper", creator: "RobTop", id: "-7" },
      { name: "Time Machine", creator: "RobTop", id: "-8" },
      { name: "Cycles", creator: "RobTop", id: "-9" },
      { name: "xStep", creator: "RobTop", id: "-10" },
      { name: "Clutterfunk", creator: "RobTop", id: "-11" },
      { name: "Theory of Everything", creator: "RobTop", id: "-12" },
      { name: "Electroman Adventures", creator: "RobTop", id: "-13" },
      { name: "Clubstep", creator: "RobTop", id: "-14" },
      { name: "Electrodynamix", creator: "RobTop", id: "-15" },
      { name: "Hexagon Force", creator: "RobTop", id: "-16" },
      { name: "Blast Processing", creator: "RobTop", id: "-17" },
      { name: "Theory of Everything 2", creator: "RobTop", id: "-18" },
      { name: "Geometrical Dominator", creator: "RobTop", id: "-19" },
      { name: "Deadlocked", creator: "RobTop", id: "-20" },
      { name: "Fingerdash", creator: "RobTop", id: "-21" },
      { name: "Dash", creator: "RobTop", id: "-22" }
    ];

    let currentPage = 0;
    const itemsPerPage = 10;
    let currentTab = 'levels';

    function renderPage() {
      const container = document.getElementById('level-list');
      container.innerHTML = '';
      container.scrollTop = 0; 
      
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = levels.slice(start, end);

      pageItems.forEach(item => {
        const row = document.createElement('div');
        row.className = `level-item ${item.special ? 'import-style' : ''}`;
        
        row.innerHTML = `
          <div class="level-info">
            <p class="level-name">${item.name}</p>
            <span class="level-creator">BY ${item.creator.toUpperCase()}</span>
          </div>
          <img src="https://lwepgqwnwivcwefwlxhw.supabase.co/storage/v1/object/public/Music2/Play%20button.webp" 
               class="play-btn" onclick="handleInteraction('${item.id}')">
        `;
        container.appendChild(row);
      });

      updateUI(end);
    }

    function updateUI(endIndex) {
      if (currentTab === 'levels') {
        document.getElementById('page-text').style.display = 'block';
        document.getElementById('page-text').innerText = `PAGE ${currentPage + 1}`;
        document.getElementById('prev-btn').style.display = currentPage === 0 ? 'none' : 'block';
        document.getElementById('next-btn').style.display = endIndex >= levels.length ? 'none' : 'block';
      } else {
        document.getElementById('page-text').style.display = 'none';
        document.getElementById('prev-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
      }
    }

    function openTab(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.content-viewport').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

      if (tabName === 'levels') {
        document.getElementById('level-list').classList.add('active');
        document.getElementById('tab-levels').classList.add('active');
        renderPage();
      } else {
        document.getElementById('demonlist-content').classList.add('active');
        document.getElementById('tab-demonlist').classList.add('active');
        updateUI();
      }
    }

    function changePage(dir) {
      currentPage += dir;
      renderPage();
    }

    function handleInteraction(id) {
      if (id === 'custom') {
        const val = prompt("Enter Level ID:");
        if (val && !isNaN(val)) loadLevel(val);
      } else {
        loadLevel(id);
      }
    }

    function loadLevel(id) {
      window.location.href = `/geometrydashdotcom/game?id=${id}`;
    }

    renderPage();
  </script>
</body>
</html>
