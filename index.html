<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geometry Dash</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      background: black;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #222;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #444;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <button onclick="loadLevel('SM')">Stereo Madness</button>
  <button onclick="loadLevel('EE')">Every End</button>
  <button onclick="const id = prompt('Enter level ID:');loadLevel(id)">Custom Level (from gd servers)</button>

  <script>
    function loadLevel(id) {
      window.location.href = `/geometrydashdotcom/game.html?id=${id}`;
    }
  </script>

</body>
</html>
