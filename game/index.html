<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geometry Dash</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: black;}
        canvas { display: block; margin: 0 auto; }
    </style>
  <script>
    async function start() {
      const levelId = Number(new URLSearchParams(location.search).get('id')) || 1;

      await navigator.serviceWorker.register('/geometrydashdotcom/worker.js');
      await navigator.serviceWorker.ready;

      navigator.serviceWorker.controller?.postMessage({ levelId });

      const script = document.createElement('script');
      script.type = 'module';
      script.src = '/assets/index-game.js';
      document.body.appendChild(script);
    }

    start();
  </script>
  <script>
    let fix = false;
    navigator.serviceWorker.addEventListener("message", (event) => {
      if (event.data.type === "invalid-id") {
        if (fix) return;
        fix = true;
        alert("Level doesn't exist... are you sure you typed the ID correctly?");
        window.location.href = "https://lasokar.github.io/geometrydashdotcom/";
      }
      if (event.data.type === "rate-limit") {
        if (fix) return;
        fix = true;
        alert("Site is currently being rate limited from GD servers, please try again later!");
        window.location.href = "https://lasokar.github.io/geometrydashdotcom/";
      }
    });
  </script>
  <script>
    // ResizeObserver catches iframe size changes that window.resize misses
    // (e.g. parent window maximize, snap, title bar drag)
    new ResizeObserver(() => {
      window.dispatchEvent(new Event('resize'));
    }).observe(document.documentElement);
  </script>
</head>
<body>
</body>
</html>
